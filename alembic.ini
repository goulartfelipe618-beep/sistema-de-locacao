# ==========================================================================
# Configuração do Alembic (migrations).
# A URL de conexão é resolvida dinamicamente em alembic/env.py a partir
# das configurações da aplicação (app.core.config), NÃO daqui.
# ==========================================================================
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = America/Sao_Paulo
version_path_separator = os

# Formato do nome dos arquivos de migration (data + slug + rev).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s-%%(rev)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
