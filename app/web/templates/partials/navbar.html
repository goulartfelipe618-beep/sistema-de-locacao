<header class="navbar">
  <div class="navbar-left">
    <h1 class="page-title">{{ title|default('Painel') }}</h1>
  </div>
  <div class="navbar-right" x-data="{ menu: false }">
    {% if current_user %}
      <div class="user-menu">
        <button type="button" class="user-btn" @click="menu = !menu">
          <span class="user-avatar">{{ current_user.full_name[:1]|upper }}</span>
          <span class="user-info">
            <span class="user-name">{{ current_user.full_name }}</span>
            <span class="user-email">{{ current_user.email }}</span>
          </span>
          <span class="user-caret">▾</span>
        </button>
        <div class="user-dropdown" x-show="menu" x-cloak @click.outside="menu = false">
          <div class="user-dropdown-header">
            {% if current_user.roles %}
              {{ current_user.roles|join(', ') }}
            {% else %}
              Sem papel atribuído
            {% endif %}
          </div>
          <form method="post" action="/logout" class="user-dropdown-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="user-dropdown-item user-dropdown-btn">Sair</button>
          </form>
        </div>
      </div>
    {% endif %}
  </div>
</header>
