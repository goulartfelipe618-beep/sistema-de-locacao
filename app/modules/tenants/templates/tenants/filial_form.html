{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width: 780px;">
  <h2 class="card-title">{{ title }}</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}

  <form method="post" action="{{ action }}">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="code">Código</label>
        <input class="form-input" id="code" name="code"
               value="{{ filial.code if filial else (form.code if form else '') }}"
               {{ 'disabled' if filial else 'required' }}>
        {% if filial %}<span class="form-help">O código não pode ser alterado.</span>{% endif %}
      </div>
      <div class="form-group">
        <label class="form-label" for="name">Nome</label>
        <input class="form-input" id="name" name="name"
               value="{{ filial.name if filial else (form.name if form else '') }}" required>
      </div>
      {% if not filial %}
      <div class="form-group">
        <label class="form-label" for="cnpj">CNPJ</label>
        <input class="form-input" id="cnpj" name="cnpj" value="">
        <span class="form-help">Somente números ou formatado.</span>
      </div>
      {% endif %}
      <div class="form-group">
        <label class="form-label" for="city">Cidade</label>
        <input class="form-input" id="city" name="city" value="{{ filial.city if filial else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="state">UF</label>
        <input class="form-input" id="state" name="state" maxlength="2"
               value="{{ filial.state if filial else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="phone">Telefone</label>
        <input class="form-input" id="phone" name="phone" value="{{ filial.phone if filial else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Matriz</label>
        <label class="form-check">
          <input type="checkbox" name="is_headquarters" value="true"
                 {{ 'checked' if filial and filial.is_headquarters else '' }}>
          Definir como matriz
        </label>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a href="/configuracoes/filiais" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
