{% extends "base.html" %}
{% from "macros/form_instructions.html" import form_instructions, form_page_header %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<div class="card">
  {{ form_page_header(title, "comercial.cupom") }}
  <form method="post" action="/comercial/cupons/novo">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Código *</label><input class="form-input" name="codigo" required></div>
      <div class="form-group"><label class="form-label">Tipo</label>
        <select class="form-input" name="tipo">{% for t in cupom_tipos %}<option value="{{ t }}">{{ t }}</option>{% endfor %}</select>
      </div>
      <div class="form-group"><label class="form-label">Valor *</label><input class="form-input" name="valor" value="0" required></div>
      <div class="form-group"><label class="form-label">Categoria (elegível)</label>
        <select class="form-input" name="categoria_id">
          <option value="">(todas)</option>
          {% for c in categorias %}<option value="{{ c.id }}">{{ c.nome }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Valor mínimo</label><input class="form-input" name="valor_minimo" value="0"></div>
      <div class="form-group"><label class="form-label">Limite uso total</label><input class="form-input" name="limite_uso_total"></div>
      <div class="form-group"><label class="form-label">Limite uso por cliente</label><input class="form-input" name="limite_uso_cliente"></div>
      <div class="form-group"><label class="form-label">Início</label><input class="form-input" type="date" name="inicio_em"></div>
      <div class="form-group"><label class="form-label">Fim</label><input class="form-input" type="date" name="fim_em"></div>
      <div class="form-group"><label class="form-label">Primeira locação apenas</label>
        <select class="form-input" name="primeira_locacao_apenas"><option value="">Não</option><option value="on">Sim</option></select>
      </div>
      <div class="form-group" style="grid-column:span 2"><label class="form-label">Descrição</label><input class="form-input" name="descricao"></div>
    </div>
    <div class="form-actions" style="margin-top:12px">
      <button class="btn btn-primary" type="submit">Salvar Cupom</button>
      <a class="btn" href="/comercial/cupons">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
