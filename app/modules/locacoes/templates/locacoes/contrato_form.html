{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:1100px">
  <h2 class="card-title">{{ title }}</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="/locacoes/contratos/novo">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <h3>Período e filiais</h3>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Filial retirada</label>
        <select class="form-input" name="filial_retirada_id" required>
          <option value="">Selecionar</option>
          {% for f in filiais %}<option value="{{ f.id }}" {% if form.filial_retirada_id == f.id|string %}selected{% endif %}>{{ f.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Filial devolução</label>
        <select class="form-input" name="filial_devolucao_id" required>
          <option value="">Selecionar</option>
          {% for f in filiais %}<option value="{{ f.id }}" {% if form.filial_devolucao_id == f.id|string %}selected{% endif %}>{{ f.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Retirada prevista</label><input class="form-input" type="datetime-local" name="retirada_prevista_em" required value="{{ form.retirada_prevista_em }}"></div>
      <div class="form-group"><label class="form-label">Devolução prevista</label><input class="form-input" type="datetime-local" name="devolucao_prevista_em" required value="{{ form.devolucao_prevista_em }}"></div>
      <div class="form-group"><label class="form-label">Origem</label>
        <select class="form-input" name="origem">
          {% for o in ['balcao','website','app','parceiro','telefone'] %}
          <option value="{{ o }}" {% if form.origem == o %}selected{% endif %}>{{ o }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <h3>Veículo e cliente</h3>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Categoria</label>
        <select class="form-input" name="categoria_id" required>
          <option value="">Selecionar</option>
          {% for c in categorias %}<option value="{{ c.id }}" {% if form.categoria_id == c.id|string %}selected{% endif %}>{{ c.nome }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Veículo</label>
        <select class="form-input" name="veiculo_id" required>
          <option value="">Selecionar</option>
          {% for v in veiculos %}<option value="{{ v.id }}" {% if form.veiculo_id == v.id|string %}selected{% endif %}>{{ v.placa }} — {{ categoria_nomes.get(v.categoria_id|string, '') }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Cliente</label>
        <select class="form-input" name="cliente_id" required>
          <option value="">Selecionar</option>
          {% for cl in clientes %}<option value="{{ cl.id }}" {% if form.cliente_id == cl.id|string %}selected{% endif %}>{{ cl.nome }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Parceiro</label>
        <select class="form-input" name="parceiro_id">
          <option value="">Nenhum</option>
          {% for p in parceiros %}<option value="{{ p.id }}" {% if form.parceiro_id == p.id|string %}selected{% endif %}>{{ p.nome }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <h3>Motoristas</h3>
    <div class="form-group">
      <label class="form-label">Motoristas autorizados</label>
      <select class="form-input" name="motorista_ids" multiple size="4">
        {% for m in motoristas %}<option value="{{ m.id }}" {% if m.id|string in form.motorista_ids %}selected{% endif %}>{{ m.nome }}</option>{% endfor %}
      </select>
      <label class="form-label" style="margin-top:8px">Principal</label>
      <select class="form-input" name="motorista_principal">
        <option value="">Primeiro da lista</option>
        {% for m in motoristas %}<option value="{{ m.id }}" {% if form.motorista_principal == m.id|string %}selected{% endif %}>{{ m.nome }}</option>{% endfor %}
      </select>
    </div>
    <h3>Cobrança</h3>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Forma pagamento</label><input class="form-input" name="forma_pagamento" value="{{ form.forma_pagamento }}"></div>
      <div class="form-group"><label class="form-label">Condição</label>
        <select class="form-input" name="condicao">
          {% for c in ['avista','cartao_recorrente','faturado'] %}
          <option value="{{ c }}" {% if form.condicao == c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Caução</label><input class="form-input" name="caucao" value="{{ form.caucao }}"></div>
      <div class="form-group"><label class="form-label">Desconto</label><input class="form-input" name="desconto" value="{{ form.desconto }}"></div>
    </div>
    <div class="form-group"><label class="form-label">Cláusulas combustível</label><textarea class="form-input" name="clausulas_combustivel" rows="2">{{ form.clausulas_combustivel }}</textarea></div>
    <div class="form-group"><label class="form-label">Observações</label><textarea class="form-input" name="observacoes" rows="2">{{ form.observacoes }}</textarea></div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-primary" type="submit">Criar contrato</button>
      <a class="btn" href="/locacoes/contratos">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
