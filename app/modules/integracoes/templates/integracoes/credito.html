{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
{% include "integracoes/_config_section.html" %}
<div class="card" style="margin-top:16px">
  <h4>Consultar score / restrição</h4>
  <form method="post" action="/integracoes/credito/consultar" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group"><label>Cliente</label>
      <select class="form-input" name="cliente_id" required>
        {% for c in clientes %}<option value="{{ c.id }}">{{ c.nome }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group" style="align-self:end"><button class="btn btn-primary" type="submit">Consultar crédito</button></div>
  </form>
  <p class="text-muted" style="margin-top:8px">Restrição detectada pode aplicar blacklist automático no cliente.</p>
</div>
{% endblock %}
