<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>{{ doc_titulo }}</title>
  <style>
    @page { size: A4; margin: 2cm; }
    body { font-family: Helvetica, Arial, sans-serif; font-size: 12px; color: #222; }
    .header { border-bottom: 2px solid {{ brand_primary_color|default('#333') }}; padding-bottom: 8px; margin-bottom: 16px; }
    .header h1 { font-size: 16px; margin: 0 0 4px; }
    .header .meta { font-size: 10px; color: #555; }
    .header-logo { max-height: 48px; max-width: 180px; margin-bottom: 8px; }
    .doc-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .doc-table th, .doc-table td { border: 1px solid #999; padding: 4px 6px; text-align: left; }
    .doc-table th { background: #eee; }
    .footer { margin-top: 24px; font-size: 9px; color: #666; border-top: 1px solid #ccc; padding-top: 8px; }
    .watermark {
      position: fixed; top: 40%; left: 10%; font-size: 72px; color: rgba(200,0,0,0.15);
      transform: rotate(-30deg); z-index: -1;
    }
    .legal { font-size: 10px; color: #444; margin-top: 16px; }
    h2 { font-size: 14px; margin-top: 0; }
  </style>
</head>
<body>
  {% if watermark %}<div class="watermark">{{ watermark }}</div>{% endif %}
  <div class="header">
    {% if empresa_logo_url %}<img class="header-logo" src="{{ empresa_logo_url }}" alt="Logo">{% endif %}
    <h1>{{ empresa_nome }}</h1>
    <div class="meta">CNPJ: {{ empresa_cnpj }} · {{ empresa_email }} · {{ empresa_phone }}</div>
    <div class="meta"><strong>{{ doc_titulo }}</strong></div>
  </div>
  {% block doc_body %}{% endblock %}
  <div class="footer">
    Documento gerado pelo ERP Locadora · {{ empresa_razao }}
  </div>
</body>
</html>
