{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:800px">
  <h2 class="card-title">{{ title }}</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="{{ action }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label" for="nome">Nome</label><input class="form-input" id="nome" name="nome" required value="{{ item.nome if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="tipo">Tipo</label>
        <select class="form-input" id="tipo" name="tipo">
          <option value="fixo" {% if item and item.tipo.value == 'fixo' %}selected{% elif not item %}selected{% endif %}>Fixo</option>
          <option value="avulso" {% if item and item.tipo.value == 'avulso' %}selected{% endif %}>Avulso</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label" for="valor_diaria">Valor diária</label><input class="form-input" id="valor_diaria" name="valor_diaria" value="{{ item.valor_diaria if item else '0' }}"></div>
      <div class="form-group"><label class="form-label" for="estoque_disponivel">Estoque</label><input class="form-input" type="number" id="estoque_disponivel" name="estoque_disponivel" value="{{ item.estoque_disponivel if item else 0 }}"></div>
      <div class="form-group"><label class="form-label" for="foto_url">URL foto</label><input class="form-input" id="foto_url" name="foto_url" value="{{ item.foto_url if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="status">Status</label>
        <select class="form-input" id="status" name="status">
          <option value="active" {% if item and item.status.value == 'active' %}selected{% endif %}>Ativo</option>
          <option value="inactive" {% if item and item.status.value == 'inactive' %}selected{% endif %}>Inativo</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-top:12px"><label class="form-label" for="descricao">Descrição</label><textarea class="form-input" id="descricao" name="descricao" rows="3">{{ item.descricao if item else '' }}</textarea></div>
    <div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Salvar</button><a class="btn" href="/frota/acessorios">Cancelar</a></div>
  </form>
</div>
{% endblock %}
