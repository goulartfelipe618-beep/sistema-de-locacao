{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:700px">
  <h2 class="card-title">{{ title }}</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="{{ action }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label" for="nome">Nome</label><input class="form-input" id="nome" name="nome" required value="{{ item.nome if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="unidade">Unidade</label>
        <select class="form-input" id="unidade" name="unidade">
          {% for u in ['litro','kwh','m3'] %}
          <option value="{{ u }}" {% if item and item.unidade.value == u %}selected{% elif not item and u == 'litro' %}selected{% endif %}>{{ u }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label" for="preco_referencia">Preço referência</label><input class="form-input" id="preco_referencia" name="preco_referencia" value="{{ item.preco_referencia if item else '0' }}"></div>
      <div class="form-group"><label class="form-label" for="status">Status</label>
        <select class="form-input" id="status" name="status">
          <option value="active" {% if item and item.status.value == 'active' %}selected{% endif %}>Ativo</option>
          <option value="inactive" {% if item and item.status.value == 'inactive' %}selected{% endif %}>Inativo</option>
        </select>
      </div>
    </div>
    <div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Salvar</button><a class="btn" href="/frota/combustiveis">Cancelar</a></div>
  </form>
</div>
{% endblock %}
