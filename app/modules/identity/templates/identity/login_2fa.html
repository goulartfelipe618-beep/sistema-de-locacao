<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Verificação 2FA · {{ app_name }}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-header">
        <span class="brand-mark">ERP</span>
        <h1 class="login-title">Verificação em dois fatores</h1>
        <div class="login-sub">Informe o código do aplicativo autenticador</div>
      </div>
      <div class="login-body">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login/2fa" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <div class="form-group">
            <label class="form-label" for="code">Código (6 dígitos ou recuperação)</label>
            <input class="form-input" type="text" id="code" name="code" inputmode="numeric"
                   maxlength="12" required autofocus placeholder="000000">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="width:100%">Verificar</button>
          </div>
        </form>
        <p style="margin-top:16px;text-align:center">
          <a href="/login">Voltar ao login</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
