<!DOCTYPE html>
<html lang="pt-BR" data-theme="{{ ui_theme|default('hybrid') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Acesso ao Sistema · {{ app_name }}</title>
  {% include "partials/theme_boot.html" %}
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
  <script src="/static/js/theme.js" defer></script>
  <script src="/static/js/app.js" defer></script>
  <script src="/static/js/form-engine.js" defer></script>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-header">
        <span class="brand-mark">ERP</span>
        <h1 class="login-title" id="login-title">Sistema de Locação</h1>
        <div class="login-sub">Painel Administrativo</div>
      </div>
      <div class="login-body">
        {% if flash %}
        <div class="alert alert-{{ flash.type|default('danger') }}">{{ flash.message }}</div>
        {% endif %}
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login" autocomplete="off" class="erp-form" aria-labelledby="login-title">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <div class="form-group">
            <label class="form-label form-label--required" for="email">E-mail</label>
            <input class="form-input" type="email" id="email" name="email"
                   value="{{ email }}" required autofocus aria-describedby="help-email">
            <p class="form-help" id="help-email">E-mail de acesso ao painel administrativo.</p>
          </div>
          <div class="form-group">
            <label class="form-label form-label--required" for="password">Senha</label>
            <input class="form-input" type="password" id="password" name="password" required
                   aria-describedby="help-password">
            <p class="form-help" id="help-password">Mínimo de 8 caracteres.</p>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
          </div>
          <p class="form-legend-required">* Campos obrigatórios</p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
