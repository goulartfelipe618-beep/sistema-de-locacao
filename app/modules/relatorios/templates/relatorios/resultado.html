{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:640px">
  <h2 class="card-title">{{ emissao.titulo }}</h2>
  <div id="status-box" hx-get="/relatorios/emissoes/{{ emissao.id }}/status" hx-trigger="load, every 2s" hx-swap="innerHTML">
    {% include "relatorios/_status_partial.html" %}
  </div>
  <p style="margin-top:16px"><a class="btn btn-sm" href="/relatorios/historico">Histórico</a></p>
</div>
{% endblock %}
