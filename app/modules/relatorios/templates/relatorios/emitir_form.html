{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:720px">
  <h2 class="card-title">{{ title }}</h2>
  <p>{{ report.descricao }}</p>
  <form method="post" action="/relatorios/{{ categoria.value }}/{{ report.codigo }}/emitir">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Período início</label><input class="form-input" type="date" name="periodo_inicio" value="{{ periodo_inicio }}" required></div>
      <div class="form-group"><label class="form-label">Período fim</label><input class="form-input" type="date" name="periodo_fim" value="{{ periodo_fim }}" required></div>
      <div class="form-group"><label class="form-label">Filial (opcional)</label>
        <select class="form-input" name="filial_id"><option value="">Todas</option>
        {% for f in filiais %}<option value="{{ f.id }}">{{ f.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Formato</label>
        <select class="form-input" name="formato">
          <option value="pdf">PDF</option><option value="csv">CSV</option><option value="xlsx">XLSX</option>
        </select>
      </div>
    </div>
    {% if report.suporta_custom and report.colunas_disponiveis %}
    <h4>Colunas (custom)</h4>
    <div class="form-grid">{% for c in report.colunas_disponiveis %}
      <label><input type="checkbox" name="colunas" value="{{ c }}" checked> {{ c }}</label>{% endfor %}
    </div>
    {% endif %}
    <div class="form-actions"><button class="btn btn-primary" type="submit">Emitir relatório</button>
    <a class="btn" href="/relatorios/{{ categoria.value }}">Voltar</a></div>
  </form>
</div>
{% endblock %}
