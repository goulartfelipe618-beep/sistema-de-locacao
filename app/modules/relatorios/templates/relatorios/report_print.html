<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>{{ titulo }}</title>
<style>
body{font-family:Arial,sans-serif;font-size:11px;margin:24px}
h1{font-size:16px} table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{border:1px solid #ccc;padding:4px 6px;text-align:left} th{background:#eee}
.footer{margin-top:24px;font-size:9px;color:#666}
</style></head><body>
<h1>{{ titulo }}</h1>
{% if summary %}<p>{% for k,v in summary.items() %}{{ k }}: {{ v }} · {% endfor %}</p>{% endif %}
<table><thead><tr>{% for c in columns %}<th>{{ c }}</th>{% endfor %}</tr></thead>
<tbody>{% for row in rows %}<tr>{% for cell in row %}<td>{{ cell }}</td>{% endfor %}</tr>{% endfor %}
</tbody></table>
<div class="footer">ERP Locadora — relatório gerado automaticamente</div>
</body></html>
