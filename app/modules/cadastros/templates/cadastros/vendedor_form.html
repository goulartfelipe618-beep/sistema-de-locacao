{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:900px">
  <h2 class="card-title">{{ title }}</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="{{ action }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label" for="nome">Nome</label><input class="form-input" id="nome" name="nome" required value="{{ item.nome if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="status">Status</label>
        <select class="form-input" id="status" name="status">
          <option value="active" {% if item and item.status.value == 'active' %}selected{% endif %}>Ativo</option>
          <option value="inactive" {% if item and item.status.value == 'inactive' %}selected{% endif %}>Inativo</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label" for="email">E-mail</label><input class="form-input" id="email" name="email" value="{{ item.email if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="telefone">Telefone</label><input class="form-input" id="telefone" name="telefone" value="{{ item.telefone if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="filial_id">Filial</label>
        <select class="form-input" id="filial_id" name="filial_id">
          <option value="">—</option>
          {% for f in filiais %}
          <option value="{{ f.id }}" {% if item and item.filial_id == f.id %}selected{% endif %}>{{ f.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label" for="comissao_percentual">Comissão %</label><input class="form-input" type="number" step="0.01" id="comissao_percentual" name="comissao_percentual" value="{{ item.comissao_percentual if item else '0' }}"></div>
      <div class="form-group"><label class="form-label" for="meta_contratos_mes">Meta contratos/mês</label><input class="form-input" type="number" id="meta_contratos_mes" name="meta_contratos_mes" value="{{ item.meta_contratos_mes if item else 0 }}"></div>
      <div class="form-group"><label class="form-label" for="meta_faturamento_mes">Meta faturamento/mês</label><input class="form-input" type="number" step="0.01" id="meta_faturamento_mes" name="meta_faturamento_mes" value="{{ item.meta_faturamento_mes if item else '0' }}"></div>
    </div>
    <div class="form-group" style="margin-top:12px"><label class="form-label" for="observacoes">Observações</label><textarea class="form-input" id="observacoes" name="observacoes" rows="3">{{ item.observacoes if item else '' }}</textarea></div>
    <div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Salvar</button><a class="btn" href="/cadastros/vendedores">Cancelar</a></div>
  </form>
</div>
{% endblock %}
