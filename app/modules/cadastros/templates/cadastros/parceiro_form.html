{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:900px">
  <h2 class="card-title">{{ title }}</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="{{ action }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label" for="nome">Nome</label><input class="form-input" id="nome" name="nome" required value="{{ item.nome if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="nome_fantasia">Nome fantasia</label><input class="form-input" id="nome_fantasia" name="nome_fantasia" value="{{ item.nome_fantasia if item else '' }}"></div>
      {% if not item %}
      <div class="form-group"><label class="form-label" for="person_type">Tipo pessoa</label>
        <select class="form-input" id="person_type" name="person_type" required>
          <option value="pf">Pessoa Física</option>
          <option value="pj">Pessoa Jurídica</option>
        </select>
      </div>
      {% endif %}
      <div class="form-group"><label class="form-label" for="tipo">Tipo parceria</label>
        <select class="form-input" id="tipo" name="tipo">
          {% for t in ['indicacao','white_label','franquia','marketplace'] %}
          <option value="{{ t }}" {% if item and item.tipo.value == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label" for="status">Status</label>
        <select class="form-input" id="status" name="status">
          <option value="active" {% if item and item.status.value == 'active' %}selected{% endif %}>Ativo</option>
          <option value="inactive" {% if item and item.status.value == 'inactive' %}selected{% endif %}>Inativo</option>
        </select>
      </div>
      {% if not item %}
      <div class="form-group"><label class="form-label" for="cpf">CPF (PF)</label><input class="form-input" id="cpf" name="cpf"></div>
      <div class="form-group"><label class="form-label" for="cnpj">CNPJ (PJ)</label><input class="form-input" id="cnpj" name="cnpj"></div>
      {% endif %}
      <div class="form-group"><label class="form-label" for="email">E-mail</label><input class="form-input" id="email" name="email" value="{{ item.email if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="telefone">Telefone</label><input class="form-input" id="telefone" name="telefone" value="{{ item.telefone if item else '' }}"></div>
      <div class="form-group"><label class="form-label" for="comissao_percentual">Comissão %</label><input class="form-input" type="number" step="0.01" id="comissao_percentual" name="comissao_percentual" value="{{ item.comissao_percentual if item else '0' }}"></div>
      <div class="form-group"><label class="form-label" for="comissao_valor_fixo">Comissão fixa</label><input class="form-input" type="number" step="0.01" id="comissao_valor_fixo" name="comissao_valor_fixo" value="{{ item.comissao_valor_fixo if item else '0' }}"></div>
      <div class="form-group"><label class="form-label" for="pix_chave">Chave PIX</label><input class="form-input" id="pix_chave" name="pix_chave" value="{{ item.pix_chave if item else '' }}"></div>
    </div>
    <div class="form-group" style="margin-top:12px"><label class="form-label" for="observacoes">Observações</label><textarea class="form-input" id="observacoes" name="observacoes" rows="3">{{ item.observacoes if item else '' }}</textarea></div>
    <div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Salvar</button><a class="btn" href="/cadastros/parceiros">Cancelar</a></div>
  </form>
</div>
{% endblock %}
