# Reverse proxy de produção — ERP Locadora
# Escuta na porta 80 e encaminha para o serviço web interno.

upstream erp_web {
    server web:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Health do próprio Nginx (usado pelo healthcheck do Compose).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Arquivos estáticos servidos pelo app (opcionalmente cacheável).
    location /static/ {
        proxy_pass http://erp_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://erp_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
