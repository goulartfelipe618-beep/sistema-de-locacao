# Dev local: use o compose da raiz (`docker compose up site`) ou:
#   cd site/bff && uvicorn main:app --reload --port 8090
# Com .env na raiz do repositório (ERP_API_KEY, ERP_INTERNAL_URL, etc.)
#
# Este arquivo mantido apenas para testes isolados do site.

services:
  site:
    build: .
    ports:
      - "8080:80"
    env_file:
      - ../.env
    environment:
      ERP_INTERNAL_URL: ${ERP_INTERNAL_URL:-http://host.docker.internal:8000}
