services:
  site-bff:
    build: ./bff
    env_file:
      - .env
    ports:
      - "8090:8090"
    restart: unless-stopped

  site-web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - site-bff
    restart: unless-stopped
