# ==========================================================================
# ERP Locadora — Docker Compose (produção / VPS Ubuntu 24.04)
#
# Fluxo padrão na VPS (sem etapas manuais extras):
#   git pull
#   docker compose up -d --build
#
# IMPORTANTE: --build é obrigatório após git pull — o código fica dentro da imagem.
# Ordem: db + redis → migrate → seed → web / worker / beat → nginx
# ==========================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-app-image: &app-image
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: erp-locadora:${IMAGE_TAG:-latest}

services:

  db:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: erp-locadora-db:${IMAGE_TAG:-latest}
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?Defina POSTGRES_SUPERUSER_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-erp}
      APP_DB_USER: ${POSTGRES_USER:-erp_app}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      APP_DB_NAME: ${POSTGRES_DB:-erp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    logging: *default-logging
    networks:
      - erp_net

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Defina REDIS_PASSWORD no .env}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    logging: *default-logging
    networks:
      - erp_net

  migrate:
    <<: *app-image
    container_name: erp_migrate
    command: ["migrate"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
    restart: "on-failure"
    logging: *default-logging
    networks:
      - erp_net

  seed:
    <<: *app-image
    container_name: erp_seed
    command: ["seed"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "on-failure"
    logging: *default-logging
    networks:
      - erp_net

  web:
    <<: *app-image
    container_name: erp_web
    command: ["web"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-nginx}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    logging: *default-logging
    networks:
      - erp_net

  worker:
    <<: *app-image
    container_name: erp_worker
    command: ["worker"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging
    networks:
      - erp_net

  beat:
    <<: *app-image
    container_name: erp_beat
    command: ["beat"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging
    networks:
      - erp_net

  nginx:
    image: nginx:1.27-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - erp_net

  # Site institucional (serviço separado — white-label)
  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    image: erp-site:${IMAGE_TAG:-latest}
    container_name: erp_site
    restart: unless-stopped
    env_file: .env
    environment:
      ERP_INTERNAL_URL: http://web:8000
      ERP_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-matriz}
      ERP_API_KEY: ${SITE_ERP_API_KEY:-}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-matriz}
      SITE_PUBLIC_URL: ${SITE_PUBLIC_URL:-http://localhost:8080}
      SITE_ALLOWED_ORIGINS: ${SITE_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    ports:
      - "${SITE_HTTP_PORT:-8080}:80"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/bff/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - erp_net

volumes:
  pgdata:
    name: erp_pgdata
  redisdata:
    name: erp_redisdata

networks:
  erp_net:
    name: erp_net
    driver: bridge
